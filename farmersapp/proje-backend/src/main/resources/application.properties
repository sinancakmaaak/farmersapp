spring.application.name=farmersapp

# === Veri Kaynağı Ayarları ===
spring.datasource.url=jdbc:mysql://localhost:3306/farmer_app?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# === JPA / Hibernate Ayarları ===
# ddl-auto: validate | update | create | create-drop
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# === Ek Ayarlar (isteğe bağlı) ===
# SQL çıktılarındaki tarih formatı vs. için
spring.jpa.properties.hibernate.format_sql=true

spring.main.allow-circular-references=true

# === OpenAPI Configuration ===
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.filter=true

# Server Configuration
server.port=8080

# Logging Configuration
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# CORS Configuration
spring.web.cors.allowed-origins=http://localhost:3000
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# JWT Configuration
jwt.secret=your-secret-key-here-make-it-long-and-secure-in-production
jwt.expiration=86400000

# Upload directory configuration
app.upload.dir=uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Open-Meteo API’lerinin temel URL’leri
weather.api.geocode-url=https://geocoding-api.open-meteo.com/v1/search
weather.api.forecast-url=https://api.open-meteo.com/v1/forecast
weather.api.timezone=Europe/Istanbul


